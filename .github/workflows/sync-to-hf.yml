name: Sync to Hugging Face Space

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global credential.helper store
          echo "https://Shivoo29:${HF_TOKEN}@huggingface.co" > ~/.git-credentials
          git remote add huggingface https://huggingface.co/spaces/Shivoo29/my-env || true
          git push huggingface main --force
